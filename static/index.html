<!DOCTYPE html>
<html lang="es">
<head>
<script>
  // Initialize theme AND mode from localStorage before any render — prevents flash
  (function() {
    try {
      var savedTheme = localStorage.getItem('cotd_theme');
      var theme = (savedTheme === 'light' || savedTheme === 'dark') ? savedTheme : 'dark';
      document.documentElement.setAttribute('data-theme', theme);

      var savedMode = localStorage.getItem('cotd_mode');
      var mode = (savedMode === 'lite' || savedMode === 'pro') ? savedMode : 'lite';
      document.documentElement.setAttribute('data-mode', mode);
    } catch(e) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.setAttribute('data-mode', 'lite');
    }
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CandleEye">
<meta name="theme-color" content="#181A20">
<title>Charts of the Day</title>
<style>
  /* ═══════════════════════════════════════════════════════════════
     COTD v4 Visual System — Binance native
     Dark mode default, light mode via data-theme="light"
     ═══════════════════════════════════════════════════════════════ */

  :root, [data-theme="dark"] {
    --bg: #181A20;
    --bg-2: #1E2329;
    --bg-3: #0B0E11;
    --border: #2B3139;
    --border-strong: #474D57;
    --text: #EAECEF;
    --text-2: #B7BDC6;
    --text-dim: #848E9C;
    --text-mute: #5E6673;
    --amber: #F0B90B;
    --amber-bright: #FCD535;
    --amber-bg: rgba(240, 185, 11, 0.12);
    --amber-bg-strong: rgba(240, 185, 11, 0.22);
    --up: #0ECB81;
    --up-bg: rgba(14, 203, 129, 0.10);
    --down: #F6465D;
    --down-bg: rgba(246, 70, 93, 0.10);
    --sma7: #FCD535;
    --sma25: #F7A600;
    --sma99: #B47AF0;
    --grid: rgba(255, 255, 255, 0.05);
    --btn-text-up: #0B0E11;
    --btn-text-down: #FFFFFF;
    --chart-bg: #181A20;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
  }

  [data-theme="light"] {
    --bg: #FFFFFF;
    --bg-2: #F5F5F5;
    --bg-3: #EAECEF;
    --border: #EAECEF;
    --border-strong: #CFD5DC;
    --text: #0B0E11;
    --text-2: #474D57;
    --text-dim: #707A8A;
    --text-mute: #B7BDC6;
    --amber: #F0B90B;
    --amber-bright: #FCD535;
    --amber-bg: rgba(240, 185, 11, 0.08);
    --amber-bg-strong: rgba(240, 185, 11, 0.18);
    --up: #03A66D;
    --up-bg: rgba(3, 166, 109, 0.06);
    --down: #CF304A;
    --down-bg: rgba(207, 48, 74, 0.06);
    --sma7: #F0B90B;
    --sma25: #F7A600;
    --sma99: #8B5CF6;
    --grid: rgba(11, 14, 17, 0.06);
    --btn-text-up: #FFFFFF;
    --btn-text-down: #FFFFFF;
    --chart-bg: #FFFFFF;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    transition: background 0.15s ease, color 0.15s ease;
  }
  body {
    padding: max(26px, calc(env(safe-area-inset-top) + 10px)) 10px max(20px, env(safe-area-inset-bottom)) 10px;
    position: relative;
    overflow-x: hidden;
  }

  #root { width: 100%; max-width: 520px; margin: 0 auto; position: relative; z-index: 1; }

  h1, .display {
    font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
  }

  .btn {
    font-family: inherit;
    font-weight: 700;
    font-size: 16px;
    padding: 14px 0;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.08s, opacity 0.15s;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-long { background: var(--up); color: var(--btn-text-up); }
  .btn-short { background: var(--down); color: var(--btn-text-down); }
  .btn-primary { background: var(--amber); color: #0B0E11; }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

  .hit-bg { background: var(--amber); color: #0B0E11; }
  .hit-fg { color: var(--amber); }
  .miss-bg { background: var(--text-mute); color: var(--text); }
  .miss-fg { color: var(--text-dim); }

  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--bg-3); border: 1.5px solid var(--border-strong);
    transition: background 0.25s, border-color 0.25s, transform 0.25s;
  }
  .dot.hit { background: var(--up); border-color: var(--up); }
  .dot.miss { background: var(--down); border-color: var(--down); }
  .dot.active {
    background: var(--text-mute);
    border-color: var(--text-dim);
    box-shadow: 0 0 0 2px var(--amber-bg);
  }

  .chip {
    display: inline-block; font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px;
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border);
  }

  /* TF group (1H / 4H / 1D) */
  .tf-group {
    display: inline-flex; background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px; gap: 2px;
  }
  .tf-btn {
    font-family: inherit; font-weight: 600; font-size: 12px;
    padding: 5px 10px; border: none; background: transparent;
    color: var(--text-dim); cursor: pointer; border-radius: 6px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background 0.12s, color 0.12s;
  }
  .tf-btn.tf-active {
    background: var(--amber); color: #0B0E11;
  }
  .tf-btn:disabled { cursor: not-allowed; }
  .tf-btn.tf-locked { opacity: 0.35; }

  /* Lang group */
  .lang-group {
    display: inline-flex; background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px; gap: 2px;
  }
  .lang-btn {
    font-family: inherit;
    font-weight: 600; font-size: 11px;
    padding: 4px 10px; border: none; background: transparent;
    color: var(--text-dim); cursor: pointer; border-radius: 6px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background 0.12s, color 0.12s;
  }
  .lang-btn.lang-active {
    background: var(--amber); color: #0B0E11;
  }

  /* Mode toggle (Lite / Pro) — new */
  .mode-group {
    display: inline-flex; background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px; gap: 2px;
  }
  .mode-btn {
    font-family: inherit;
    font-weight: 600; font-size: 11px;
    padding: 4px 10px; border: none; background: transparent;
    color: var(--text-dim); cursor: pointer; border-radius: 6px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background 0.12s, color 0.12s;
  }
  .mode-btn.mode-active {
    background: var(--amber); color: #0B0E11;
    font-weight: 700;
  }

  /* Theme toggle — discreet icon, no border at rest */
  .theme-btn {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: none;
    border-radius: 6px; cursor: pointer;
    color: var(--text-dim); padding: 0;
    transition: color 0.15s, background 0.15s;
    opacity: 0.7;
  }
  .theme-btn:hover { color: var(--amber); opacity: 1; background: var(--bg-2); }
  .theme-btn:active { opacity: 1; }
  .theme-btn svg { width: 14px; height: 14px; }
  [data-theme="light"] .icon-moon { display: block; }
  [data-theme="light"] .icon-sun { display: none; }
  [data-theme="dark"] .icon-moon { display: none; }
  [data-theme="dark"] .icon-sun { display: block; }

  /* Help btn — sane theming */
  #help-btn, #close-summary, #close-share, #close-howto {
    background: var(--bg-2) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
  }

  /* Tooltips */
  .ce-tooltip {
    position: absolute; z-index: 1000;
    background: var(--bg-3); color: var(--text);
    font-family: inherit;
    font-size: 13px; font-weight: 600;
    padding: 10px 14px; border-radius: 10px;
    max-width: 260px; line-height: 1.35;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    opacity: 0; transform: translateY(-4px);
    transition: opacity 180ms ease, transform 180ms ease;
    pointer-events: none;
  }
  .ce-tooltip.visible { opacity: 1; transform: translateY(0); }
  .ce-tooltip::before {
    content: ''; position: absolute;
    width: 0; height: 0;
    border-style: solid;
  }
  .ce-tooltip.arrow-up::before {
    top: -8px; left: 24px;
    border-width: 0 8px 10px 8px;
    border-color: transparent transparent var(--bg-3) transparent;
  }
  .ce-tooltip.arrow-down::before {
    bottom: -8px; left: 24px;
    border-width: 10px 8px 0 8px;
    border-color: var(--bg-3) transparent transparent transparent;
  }

  /* Animations */
  @keyframes pop {
    0% { transform: scale(0.85); opacity: 0; }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.4s cubic-bezier(0.2, 0.8, 0.4, 1.2) both; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-4px); }
    40%, 80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.35s both; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.28s ease-out both; }

  @keyframes chosenPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.04); box-shadow: 0 0 0 6px var(--amber-bg); }
    100% { transform: scale(1); }
  }
  .chosen { animation: chosenPulse 0.45s ease-out both; }

  /* Timer-big overlay on chart */
  .timer-big {
    position: absolute; top: 10px; right: 10px;
    background: var(--amber); color: #0B0E11;
    font-family: inherit; font-weight: 800;
    font-size: 32px; line-height: 1;
    padding: 6px 12px; border-radius: 10px;
    pointer-events: none;
    animation: timerPulse 0.6s ease-in-out infinite alternate;
    z-index: 5;
  }
  .timer-big.danger { background: var(--down); color: #FFFFFF; animation-duration: 0.3s; }
  @keyframes timerPulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }

  /* Score bump animation */
  @keyframes scoreBump {
    0% { transform: scale(1); color: var(--text); }
    40% { transform: scale(1.25); color: var(--amber); }
    100% { transform: scale(1); color: var(--text); }
  }
  .score-bump { animation: scoreBump 0.5s ease-out both; }
  @keyframes scoreBumpMiss {
    0% { transform: scale(1); color: var(--text); }
    30% { transform: scale(0.92); color: var(--text-dim); }
    100% { transform: scale(1); color: var(--text); }
  }
  .score-bump-miss { animation: scoreBumpMiss 0.45s ease-out both; }

  /* Confetti (keep functional) */
  #confetti-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden;
  }
  .confetti {
    position: absolute; width: 10px; height: 14px;
    top: -20px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Timer bar */
  .timer-bar { height: 4px; border-radius: 100px; background: var(--bg-3); overflow: hidden; }
  .timer-fill { height: 100%; background: var(--amber); transition: width 0.1s linear, background 0.2s; border-radius: 100px; }

  /* Chart wrap — adapts to theme AND mode
     Lite = full height (tall, room to breathe, no extra panels)
     Pro  = compressed 82% (because Pro has MA legend + volume panel absorbing vertical space)
  */
  /* Chart wrap — SVG inside sets its own aspect-ratio (varies by mode: Lite=420/520, Pro=420/440) */
  #chart-wrap {
    background: var(--chart-bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    width: 100%;
  }

  .meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-dim); }

  .link-btn {
    background: none; border: none; color: var(--text-dim); text-decoration: underline;
    font-family: inherit; font-size: 13px; cursor: pointer; padding: 0;
  }

  /* ═══════════════════════════════════════════════════════════════
     v5: Mockup-style layouts (play header, pair-header, verdict banner)
     ═══════════════════════════════════════════════════════════════ */

  /* Top bar with centered round label */
  .v5-topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0 6px;
    gap: 8px;
  }
  .v5-back {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); font-size: 22px; cursor: pointer;
    background: transparent; border: none; padding: 0;
    font-weight: 400;
  }
  .v5-round-label {
    font-size: 15px; color: var(--text-dim); font-weight: 400;
    flex: 1; text-align: center;
  }
  .v5-round-label b { color: var(--text); font-weight: 700; }

  /* Compact round counter (left side of topbar) — "Round 02/05" */
  .v5-round-compact {
    font-size: 14px; font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .v5-round-compact .label {
    color: var(--text-dim);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.02em;
    margin-right: 3px;
  }
  .v5-round-compact .slash {
    color: var(--text-dim);
    font-weight: 400;
    margin: 0 2px;
  }

  /* Progress dots container (inline in topbar) */
  .v5-dots {
    flex: 1;
    display: flex; justify-content: center;
    min-width: 0;
  }

  /* Score display (right side of topbar, left of theme toggle) */
  .v5-score {
    font-size: 14px; font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* Pair header (below topbar, before chart) */
  .v5-pair-header {
    padding: 14px 2px 12px;
    border-bottom: 1px solid var(--border);
  }
  .v5-pair-name {
    font-size: 19px; font-weight: 700; color: var(--text);
    letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .v5-pair-name .sub { color: var(--text-dim); font-weight: 400; font-size: 14px; }
  .v5-pair-meta {
    display: flex; gap: 14px; font-size: 11px; color: var(--text-dim);
  }
  .v5-pair-meta b { color: var(--amber); font-weight: 600; margin-left: 4px; }

  /* Chart toolbar (TF tabs + MA·Vol button) */
  .v5-chart-toolbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 2px;
    border-bottom: 1px solid var(--border);
  }
  .v5-tf-group { display: flex; }
  .v5-tf {
    padding: 8px 12px;
    font-size: 12px; font-weight: 600;
    color: var(--text-dim); cursor: pointer;
    position: relative;
    background: none; border: none;
    font-family: inherit;
  }
  .v5-tf.active { color: var(--amber); }
  .v5-tf.active::after {
    content: ""; position: absolute;
    bottom: -1px; left: 12px; right: 12px;
    height: 2px; background: var(--amber);
  }
  .v5-indicators-btn {
    font-size: 10px; color: var(--text-dim);
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    font-family: inherit;
    font-weight: 500;
  }

  /* Verdict banner (reveal — compact, replaces timer+buttons zone) */
  .v5-verdict {
    padding: 14px 14px;
    border-radius: 10px;
    display: flex; align-items: center; gap: 12px;
    margin-top: 12px;
  }
  .v5-verdict.hit {
    background: var(--up-bg);
    border: 1px solid color-mix(in srgb, var(--up) 22%, transparent);
  }
  .v5-verdict.miss {
    background: var(--bg-2);
    border: 1px solid var(--border);
  }
  .v5-verdict-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
    flex-shrink: 0;
  }
  .v5-verdict.hit .v5-verdict-icon { background: var(--up); color: #FFFFFF; }
  .v5-verdict.miss .v5-verdict-icon { background: var(--text-mute); color: #FFFFFF; }
  .v5-verdict-content { flex: 1; min-width: 0; }
  .v5-verdict-title {
    font-size: 18px; font-weight: 700; color: var(--text);
    letter-spacing: 0.02em;
  }
  .v5-verdict.hit .v5-verdict-title { color: var(--up); }
  .v5-verdict.miss .v5-verdict-title { color: var(--text-dim); }
  .v5-verdict-sub {
    font-size: 13px; color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }
  .v5-verdict-points {
    font-size: 24px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .v5-verdict.hit .v5-verdict-points { color: var(--up); }
  .v5-verdict.miss .v5-verdict-points { color: var(--text-dim); }

  /* Reveal pair meta row (below verdict) */
  .v5-reveal-pair {
    padding: 12px 2px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 0;
  }
  .v5-reveal-pair-left .rp-name {
    font-size: 16px; font-weight: 700; color: var(--text);
    letter-spacing: 0.3px;
  }
  .v5-reveal-pair-left .rp-name .sub { color: var(--text-dim); font-weight: 400; }
  .v5-reveal-pair-left .rp-date {
    font-size: 10px; color: var(--text-dim);
    margin-top: 2px;
  }
  .v5-reveal-pair-right {
    text-align: right;
  }
  .v5-reveal-pair-right .rp-tf {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .v5-reveal-pair-right .rp-move {
    font-size: 15px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }
  .v5-reveal-pair-right .rp-move.up { color: var(--up); }
  .v5-reveal-pair-right .rp-move.dn { color: var(--down); }

  /* Tables (for dev view if used) */
  table.trades { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.trades th, table.trades td { padding: 6px 4px; text-align: left; border-bottom: 1px solid var(--border); }
  table.trades th { font-weight: 700; color: var(--text-dim); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; }
  table.trades td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .status-pill { padding: 2px 8px; border-radius: 999px; font-weight: 700; font-size: 11px; }
  .pill-hit { background: var(--amber); color: #0B0E11; }
  .pill-miss { background: var(--text-mute); color: var(--text); }

  /* ═══ Onboarding overlay ═══ */
  .onboarding-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: var(--bg);
    overflow-y: auto;
    padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom)) 16px;
    display: none;
  }
  .onboarding-overlay.visible { display: block; }
  .onb-inner { max-width: 440px; margin: 0 auto; padding: 30px 0; }
  .onb-logo {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--amber); color: #0B0E11;
    padding: 8px 14px; border-radius: 8px;
    font-weight: 800; font-size: 14px; letter-spacing: 0.3px;
    margin-bottom: 20px;
  }
  .onb-title {
    font-size: 28px; font-weight: 700;
    color: var(--text);
    letter-spacing: -0.6px; line-height: 1.1;
    margin-bottom: 10px;
  }
  .onb-title .amber { color: var(--amber); }
  .onb-tag {
    font-size: 14px; color: var(--text-dim);
    font-weight: 500; margin-bottom: 24px;
  }
  .onb-tag b { color: var(--text); font-weight: 700; }
  .onb-step {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
  }
  .onb-step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--amber); color: #0B0E11;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px;
    flex-shrink: 0;
  }
  .onb-step-content { flex: 1; }

function detectLang() {
  // localStorage wins
  try {
    const saved = localStorage.getItem('candleeye_lang');
    if (saved && I18N[saved]) return saved;
  } catch (e) {}
  // Fallback: navigator
  const nav = (navigator.language || 'es').toLowerCase();
  if (nav.startsWith('zh')) return 'zh';
  if (nav.startsWith('en')) return 'en';
  return 'es';
}
function setLang(code) {
  if (!I18N[code]) return;
  state.lang = code;
  try { localStorage.setItem('candleeye_lang', code); } catch (e) {}
}
function t(key) {
  const dict = I18N[state.lang] || I18N.es;
  const fallback = I18N.es;
  return dict[key] !== undefined ? dict[key] : fallback[key];
}
// Title case: capitalize first letter (for i18n strings that are lowercase)
function tCap(key) {
  const s = t(key);
  if (!s || typeof s !== 'string') return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function formatDate(iso) {
  const d = new Date(iso);
  const dict = I18N[state.lang] || I18N.es;
  return dict.formatDate(d, dict.months);
}

// ──────────────────────────────────────────────────────────────
// Confetti (small celebration only for streak hits ≥ 2)
// Intensity scales with streak: subtle at ×1.2, big at ×2.5.
// ──────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#FFD93D', '#F0B847', '#B8860B', '#7BD389', '#FFFBF5'];
function burstConfetti(intensity) {
  const layer = document.getElementById('confetti-layer');
  if (!layer) return;
  const n = Math.round(12 + intensity * 40); // 12 to ~52
  const vw = window.innerWidth;
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const color = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
    const startX = vw * 0.5 + (Math.random() - 0.5) * vw * 0.9;
    const drift = (Math.random() - 0.5) * 200;
    const dur = 1.4 + Math.random() * 1.4;
    const delay = Math.random() * 0.2;
    const rot = Math.random() * 360;
    el.style.left = startX + 'px';
    el.style.background = color;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = delay + 's';
    el.style.transform = `translateX(${drift}px) rotate(${rot}deg)`;
    layer.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 100);
  }
}

// ──────────────────────────────────────────────────────────────
// Indicator math
// ──────────────────────────────────────────────────────────────
function sma(bars, period, field) {
  field = field || 'c';
  const out = new Array(bars.length).fill(null);
  let sum = 0;
  for (let i = 0; i < bars.length; i++) {
    sum += bars[i][field];
    if (i >= period) sum -= bars[i - period][field];
    if (i >= period - 1) out[i] = sum / period;
  }
  return out;
}

// RSI (Wilder's 14-period by default)
// Returns array aligned to bars: null until index >= period, then RSI values 0-100
function rsi(bars, period) {
  period = period || 14;
  const out = new Array(bars.length).fill(null);
  if (bars.length < period + 1) return out;

  let avgGain = 0, avgLoss = 0;
  // First period: simple average of gains/losses
  for (let i = 1; i <= period; i++) {
    const change = bars[i].c - bars[i - 1].c;
    if (change > 0) avgGain += change;
    else avgLoss += -change;
  }
  avgGain /= period;
  avgLoss /= period;

  // First RSI value at index = period
  if (avgLoss === 0) out[period] = 100;
  else {
    const rs = avgGain / avgLoss;
    out[period] = 100 - (100 / (1 + rs));
  }

  // Subsequent: Wilder's smoothing
  for (let i = period + 1; i < bars.length; i++) {
    const change = bars[i].c - bars[i - 1].c;
    const gain = change > 0 ? change : 0;
    const loss = change < 0 ? -change : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
    if (avgLoss === 0) out[i] = 100;
    else {
      const rs = avgGain / avgLoss;
      out[i] = 100 - (100 / (1 + rs));
    }
  }
  return out;
}

// ──────────────────────────────────────────────────────────────
// Chart (supports light+dark themes, Lite+Pro modes)

// Lite = single close-price line (no candles, no SMAs, no volume)

        textDim:'#848E9C', futureBg:'#F5F5F5', futureLine:'#CFD5DC', question:'#B7BDC6',
        legendBg:'rgba(255,255,255,0.9)', legendText:'#474D57' }
    : { bg:'#181A20', volBg:'#1A1D22', grid:'#2B3139', up:'#0ECB81', down:'#F6465D',
        amber:'#F0B90B', amberLine:'#F0B90B', amberFade:'rgba(240,185,11,0.22)',
        sma7:'#FCD535', sma25:'#F7A600', sma99:'#B47AF0',
        textDim:'#848E9C', futureBg:'#0B0E11', futureLine:'#2B3139', question:'#5E6673',
        legendBg:'rgba(24,26,32,0.9)', legendText:'#B7BDC6' };

  const contextEnd = warmupCount + contextBars;
  const visibleFrom = warmupCount;
  const visibleTo = showAll ? allBars.length : contextEnd;

  // Variable height: Pro needs extra room for volume + RSI panels
  // Lite keeps original compact height (just price line)
  const W = 420;
  const H = mode === 'pro' ? 560 : 520;
  const padL = 8, padR = 8;

  // Volume panel: only in Pro mode AND if any bar has v>0
  let hasVolume = false;
  if (mode === 'pro') {
    for (let i = visibleFrom; i < visibleTo; i++) {
      if (allBars[i] && allBars[i].v > 0) { hasVolume = true; break; }
    }
  }
  const hasRSI = (mode === 'pro');

  // Zone layout for Pro (H=560): price 14-400 (386px), vol 410-460 (50px), rsi 470-540 (70px)
  // Zone layout for Lite (H=520): price 14-500 (486px), nothing below
  let priceTop, priceBot, volTop, volBot, rsiTop, rsiBot;
  if (mode === 'pro') {
    priceTop = 14;
    priceBot = hasVolume ? 400 : 440;
    volTop = 410; volBot = 460;
    rsiTop = 470; rsiBot = 540;
  } else {
    priceTop = 14;
    priceBot = 500;
    volTop = 0; volBot = 0;  // unused
    rsiTop = 0; rsiBot = 0;  // unused
  }

  // Compute MAs only in pro mode (avoid waste)
  const ma7  = (mode === 'pro') ? sma(allBars, 7)  : null;
  const ma25 = (mode === 'pro') ? sma(allBars, 25) : null;
  const ma99 = (mode === 'pro') ? sma(allBars, 99) : null;

  // Price range: scan visible OHLC (always) and SMAs (if pro mode)
  let minP = Infinity, maxP = -Infinity, maxV = 0;
  for (let i = visibleFrom; i < visibleTo; i++) {
    const b = allBars[i]; if (!b) continue;
    if (mode === 'lite') {
      // Lite: range from close prices only (tighter, more elegant)
      if (b.c < minP) minP = b.c;
      if (b.c > maxP) maxP = b.c;
    } else {
      if (b.l < minP) minP = b.l;
      if (b.h > maxP) maxP = b.h;
    }
    if (b.v > maxV) maxV = b.v;
    if (mode === 'pro') {
      [ma7, ma25, ma99].forEach(arr => {
        if (arr && arr[i] != null) {
          if (arr[i] < minP) minP = arr[i];
          if (arr[i] > maxP) maxP = arr[i];
        }
      });
    }
  }
  const padP = (maxP - minP) * 0.08;
  minP -= padP; maxP += padP;

  // Layout
  const slotsTotal = contextBars + futureBars;
  const usableW = W - padL - padR;
  const barW = usableW / slotsTotal;
  const xAt = (globalIdx) => {
    const slot = globalIdx - visibleFrom;
    return padL + slot * barW + barW / 2;
  };
  const yPrice = p => priceTop + (priceBot - priceTop) * (1 - (p - minP) / (maxP - minP));
  const yVol = v => volBot - (volBot - volTop) * (v / maxV);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block; width:100%; height:auto;">`;

  // Backgrounds
  svg += `<rect x="0" y="0" width="${W}" height="${H}" fill="${C.bg}"/>`;
  if (hasVolume) {
    svg += `<rect x="0" y="${volTop-2}" width="${W}" height="${volBot-volTop+4}" fill="${C.volBg}"/>`;
  }
  if (hasRSI) {
    svg += `<rect x="0" y="${rsiTop-2}" width="${W}" height="${rsiBot-rsiTop+4}" fill="${C.volBg}"/>`;
  }

  // Subtle horizontal grid in price zone
  for (let i = 1; i < 4; i++) {
    const y = priceTop + (priceBot - priceTop) * i / 4;
    svg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}" stroke="${C.grid}" stroke-width="0.5"/>`;
  }

  // ─────── LITE MODE: single close-price line with amber fade ───────
  if (mode === 'lite') {
    // Build path for line + fill
    let linePath = '';
    let areaPath = '';
    let firstX = null, lastX = null;
    for (let i = visibleFrom; i < visibleTo; i++) {
      const b = allBars[i]; if (!b) continue;
      const x = xAt(i);
      const y = yPrice(b.c);
      if (linePath === '') {
        linePath = `M${x.toFixed(1)} ${y.toFixed(1)}`;
        firstX = x;
      } else {
        linePath += ` L${x.toFixed(1)} ${y.toFixed(1)}`;
      }
      lastX = x;
    }
    if (linePath && firstX != null && lastX != null) {
      // Area under line with amber fade gradient
      const fadeId = `fade-${Math.random().toString(36).slice(2,8)}`;
      svg += `<defs><linearGradient id="${fadeId}" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="${C.amber}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${C.amber}" stop-opacity="0"/>
      </linearGradient></defs>`;
      areaPath = linePath + ` L${lastX.toFixed(1)} ${priceBot.toFixed(1)} L${firstX.toFixed(1)} ${priceBot.toFixed(1)} Z`;
      svg += `<path d="${areaPath}" fill="url(#${fadeId})"/>`;
      svg += `<path d="${linePath}" fill="none" stroke="${C.amberLine}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`;

      // Endpoint circle at last visible point
      const lastBar = allBars[visibleTo - 1];
      if (lastBar) {
        const lastY = yPrice(lastBar.c);
        svg += `<circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.5" fill="${C.amber}"/>`;
        svg += `<circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="7" fill="none" stroke="${C.amber}" stroke-width="0.7" opacity="0.4"/>`;
      }
    }
  }

  // ─────── PRO MODE: candles + MAs + volume ───────
  if (mode === 'pro') {
    // MAs first (below candles visually)
    function drawMA(arr, color, width) {
      if (!arr) return;
      let d = '';
      for (let i = visibleFrom; i < visibleTo; i++) {
        const v = arr[i];
        if (v === null || v === undefined) continue;
        if (v < minP || v > maxP) { // off-screen, break segment
          if (d !== '') { svg += `<path d="${d}" stroke="${color}" stroke-width="${width}" fill="none" opacity="0.95" stroke-linejoin="round"/>`; d = ''; }
          continue;
        }
        const y = yPrice(v);
        d += (d === '' ? 'M' : 'L') + xAt(i).toFixed(1) + ' ' + y.toFixed(1) + ' ';
      }
      if (d !== '') svg += `<path d="${d}" stroke="${color}" stroke-width="${width}" fill="none" opacity="0.95" stroke-linejoin="round"/>`;
    }
    drawMA(ma99, C.sma99, 1.2);
    drawMA(ma25, C.sma25, 1.2);
    drawMA(ma7,  C.sma7,  1.3);

    // Candles + volume
    const candleW = Math.max(2.5, barW * 0.72);
    const wickW = Math.max(1, barW * 0.12);
    const halfCandle = candleW / 2;

    let wickUpD = '', wickDnD = '';
    let bodyUpD = '', bodyDnD = '';
    let volUpD = '', volDnD = '';

    for (let i = visibleFrom; i < visibleTo; i++) {
      const b = allBars[i]; if (!b) continue;
      const x = xAt(i);
      const up = b.c >= b.o;
      const yH = yPrice(b.h), yL = yPrice(b.l);
      const yTop = yPrice(Math.max(b.o, b.c));
      const yBot = yPrice(Math.min(b.o, b.c));
      const bodyH = Math.max(1, yBot - yTop);
      const xLeft = x - halfCandle;

      const wickSeg = 'M' + x.toFixed(1) + ' ' + yH.toFixed(1) + 'L' + x.toFixed(1) + ' ' + yL.toFixed(1);
      const bodySeg = 'M' + xLeft.toFixed(1) + ' ' + yTop.toFixed(1) +
                      'h' + candleW.toFixed(1) + 'v' + bodyH.toFixed(1) +
                      'h' + (-candleW).toFixed(1) + 'Z';

      if (up) {
        wickUpD += wickSeg;
        bodyUpD += bodySeg;
      } else {
        wickDnD += wickSeg;
        bodyDnD += bodySeg;
      }

      // Volume (only if present)
      if (hasVolume && b.v > 0) {
        const vy = yVol(b.v);
        const volH = volBot - vy;
        const volSeg = 'M' + xLeft.toFixed(1) + ' ' + vy.toFixed(1) +
                       'h' + candleW.toFixed(1) + 'v' + volH.toFixed(1) +
                       'h' + (-candleW).toFixed(1) + 'Z';
        if (up) volUpD += volSeg; else volDnD += volSeg;
      }
    }

    if (hasVolume) {
      if (volUpD) svg += `<path d="${volUpD}" fill="${C.up}" opacity="0.55"/>`;
      if (volDnD) svg += `<path d="${volDnD}" fill="${C.down}" opacity="0.55"/>`;
    }
    if (wickUpD) svg += `<path d="${wickUpD}" stroke="${C.up}" stroke-width="${wickW.toFixed(1)}" stroke-linecap="round" fill="none"/>`;
    if (wickDnD) svg += `<path d="${wickDnD}" stroke="${C.down}" stroke-width="${wickW.toFixed(1)}" stroke-linecap="round" fill="none"/>`;
    if (bodyUpD) svg += `<path d="${bodyUpD}" fill="${C.up}"/>`;
    if (bodyDnD) svg += `<path d="${bodyDnD}" fill="${C.down}"/>`;

    // MA legend (top-left, single row, label-only — no numeric values)
    svg += `<g font-family="Arial" font-size="10" font-weight="700">`;
    svg += `<rect x="${padL}" y="${priceTop - 2}" width="186" height="16" fill="${C.legendBg}" rx="2"/>`;
    // MA(7)
    svg += `<line x1="${padL + 4}" y1="${priceTop + 6}" x2="${padL + 14}" y2="${priceTop + 6}" stroke="${C.sma7}" stroke-width="2"/>`;
    svg += `<text x="${padL + 18}" y="${priceTop + 9}" fill="${C.sma7}">MA(7)</text>`;
    // MA(25)
    svg += `<line x1="${padL + 62}" y1="${priceTop + 6}" x2="${padL + 72}" y2="${priceTop + 6}" stroke="${C.sma25}" stroke-width="2"/>`;
    svg += `<text x="${padL + 76}" y="${priceTop + 9}" fill="${C.sma25}">MA(25)</text>`;
    // MA(99)
    svg += `<line x1="${padL + 126}" y1="${priceTop + 6}" x2="${padL + 136}" y2="${priceTop + 6}" stroke="${C.sma99}" stroke-width="2"/>`;
    svg += `<text x="${padL + 140}" y="${priceTop + 9}" fill="${C.sma99}">MA(99)</text>`;
    svg += `</g>`;

    // Vol label
    if (hasVolume) {
      svg += `<text x="${padL}" y="${volTop + 12}" fill="${C.textDim}" font-family="Arial" font-size="9" font-weight="700">VOL</text>`;
    }

    // ─────── RSI panel ───────
    if (hasRSI) {
      const rsiData = rsi(allBars, 14);
      // Y-axis: 0 (bottom) to 100 (top). Reference lines at 70 and 30.
      const yRSI = v => rsiBot - (rsiBot - rsiTop) * (v / 100);

      // Overbought (70) and oversold (30) reference lines
      const y70 = yRSI(70);
      const y30 = yRSI(30);
      const y50 = yRSI(50);
      // 70 line (overbought) — dashed
      svg += `<line x1="${padL}" y1="${y70.toFixed(1)}" x2="${W - padR}" y2="${y70.toFixed(1)}" stroke="${C.textDim}" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>`;
      // 30 line (oversold) — dashed
      svg += `<line x1="${padL}" y1="${y30.toFixed(1)}" x2="${W - padR}" y2="${y30.toFixed(1)}" stroke="${C.textDim}" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.5"/>`;
      // 50 center line — very subtle
      svg += `<line x1="${padL}" y1="${y50.toFixed(1)}" x2="${W - padR}" y2="${y50.toFixed(1)}" stroke="${C.grid}" stroke-width="0.3" opacity="0.5"/>`;

      // RSI line path (skip nulls at start)
      let rsiPath = '';
      for (let i = visibleFrom; i < visibleTo; i++) {
        const v = rsiData[i];
        if (v === null || v === undefined) continue;
        const x = xAt(i);
        const y = yRSI(v);
        rsiPath += (rsiPath === '' ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
      }
      if (rsiPath) {
        svg += `<path d="${rsiPath}" stroke="${C.sma99}" stroke-width="1.3" fill="none" opacity="0.95" stroke-linejoin="round"/>`;
      }

      // RSI label (left side)
      svg += `<text x="${padL}" y="${rsiTop + 11}" fill="${C.textDim}" font-family="Arial" font-size="9" font-weight="700">RSI(14)</text>`;
      // "70" and "30" small labels near reference lines
      svg += `<text x="${W - padR - 14}" y="${(y70 - 2).toFixed(1)}" fill="${C.textDim}" font-family="Arial" font-size="8" font-weight="600" opacity="0.7">70</text>`;
      svg += `<text x="${W - padR - 14}" y="${(y30 + 8).toFixed(1)}" fill="${C.textDim}" font-family="Arial" font-size="8" font-weight="600" opacity="0.7">30</text>`;
    }
  }

  // ─────── Decision marker + future zone ───────
  const decisionGlobalIdx = contextEnd - 1;
  const decisionX = xAt(decisionGlobalIdx) + barW / 2;
  // Bottom of chart activity (includes RSI if present)
  const chartBottom = hasRSI ? rsiBot : (hasVolume ? volBot : priceBot);

  if (showAll) {
    // Dotted vertical line at decision point — spans all panels
    svg += `<line x1="${decisionX.toFixed(1)}" y1="${priceTop}" x2="${decisionX.toFixed(1)}" y2="${chartBottom}" stroke="${C.textDim}" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>`;
    // Entry price horizontal guide
    const entryY = yPrice(allBars[decisionGlobalIdx].c);
    svg += `<line x1="${padL}" y1="${entryY.toFixed(1)}" x2="${W - padR}" y2="${entryY.toFixed(1)}" stroke="${C.amber}" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>`;
  } else {
    // Reserved future zone — spans all panels
    svg += `<rect x="${decisionX.toFixed(1)}" y="0" width="${(W - decisionX).toFixed(1)}" height="${H}" fill="${C.futureBg}" opacity="0.85"/>`;
    svg += `<line x1="${decisionX.toFixed(1)}" y1="${priceTop}" x2="${decisionX.toFixed(1)}" y2="${chartBottom}" stroke="${C.futureLine}" stroke-width="1" stroke-dasharray="3,3" opacity="0.65"/>`;
    const midX = decisionX + (W - decisionX) / 2;
    const midY = (priceTop + priceBot) / 2;
    svg += `<text x="${midX.toFixed(1)}" y="${(midY + 10).toFixed(1)}" text-anchor="middle" fill="${C.question}" font-family="Arial" font-size="36" font-weight="800">?</text>`;
  }

  svg += `</svg>`;
  return svg;
}

// Wrapper: re-render current chart using stored state (for theme/mode toggle)
// Helper: re-render the chart for the CURRENT screen state (play or reveal).
// Used by toggleTheme/setMode to update the chart in place without full re-render.
function rerenderCurrentChart() {
  const chartWrap = document.getElementById('chart-wrap');
  if (!chartWrap) return;

  if (state.screen === 'reveal' && state.lastReveal) {
    const r = state.lastReveal;
    const tf = r.tfBet;
    const tfr = r.tfReveals && r.tfReveals[tf];
    if (!tfr) return;
    chartWrap.innerHTML = renderChart(tfr.bars, tfr.warmup_count, tfr.context_count, tfr.future_count, true);
  } else if (state.screen === 'play' && state.current) {
    const tf = state.tfActive;
    const tfData = state.current.timeframes[tf];
    if (!tfData) return;
    chartWrap.innerHTML = renderChart(tfData.bars, tfData.warmup_count,
                                      tfData.bars.length - tfData.warmup_count,
                                      tfData.future_count, false);
  }
}

// ──────────────────────────────────────────────────────────────
// API
// ──────────────────────────────────────────────────────────────
async function apiGetRound(overrideIndex) {
  // COTD mode: fetch today's chart N.
  // For main flow, state.round has just been incremented (1..5), so use it.
  // For prefetch, pass overrideIndex explicitly (next round).
  const idx = overrideIndex != null ? overrideIndex : state.round;
  const clamped = Math.max(1, Math.min(5, idx));
  const r = await fetch(`/daily/${clamped}`);
  if (!r.ok) throw new Error('round fetch failed');
  return r.json();
}

async function apiDecide(roundId, decision, tfUsed) {
  const r = await fetch('/decide', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({round_id: roundId, decision, tf_used: tfUsed}),
  });
  if (!r.ok) throw new Error('decide failed');
  return r.json();
}

async function apiSaveSession(rounds) {
  const r = await fetch('/session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({rounds}),
  });
  return r.json();
}

// ──────────────────────────────────────────────────────────────
// Game flow
// ──────────────────────────────────────────────────────────────
function startGame() {
  state.round = 0;
  state.score = 0;
  state.streak = 0;
  state.history = [];
  state.monkeyScore = 0;
  state._prefetchPromise = null;
  nextRound();
}

// Hydrate compact bar arrays [o,h,l,c,v] into {o,h,l,c,v} objects the chart expects.
function hydrateBars(arr) {
  const out = new Array(arr.length);
  for (let i = 0; i < arr.length; i++) {
    const b = arr[i];
    out[i] = { o: b[0], h: b[1], l: b[2], c: b[3], v: b[4] };
  }
  return out;
}
function hydrateRound(data) {
  if (data && data.timeframes) {
    for (const tfName in data.timeframes) {
      const tf = data.timeframes[tfName];
      if (tf && Array.isArray(tf.bars) && tf.bars.length > 0 && Array.isArray(tf.bars[0])) {
        tf.bars = hydrateBars(tf.bars);
      }
    }
  }
  return data;
}
function hydrateFutureByTf(byTf) {
  const out = {};
  for (const tfName in byTf) {
    const arr = byTf[tfName];
    if (Array.isArray(arr) && arr.length > 0 && Array.isArray(arr[0])) {
      out[tfName] = hydrateBars(arr);
    } else {
      out[tfName] = arr || [];
    }
  }
  return out;
}

async function nextRound() {
  if (state.round >= ROUNDS_PER_GAME) {
    showSummary();
    return;
  }
  state.round++;

  // Use prefetched data if available; otherwise fetch now
  let data;
  if (state._prefetchPromise) {
    renderLoading();
    try {
      data = await state._prefetchPromise;
    } catch (err) {
      screen.innerHTML = `<div class="card"><p>Error de red: ${err.message}</p></div>`;
      return;
    }
    state._prefetchPromise = null;
  } else {
    renderLoading();
    try {
      data = await apiGetRound();
    } catch (err) {
      screen.innerHTML = `<div class="card"><p>Error de red: ${err.message}</p></div>`;
      return;
    }
  }

  hydrateRound(data);
  state.current = data;
  state.tfActive = '1h';
  state.currentStart = Date.now();
  renderPlay();
  startTimer();
  // First-ever play: show tooltips on round 1 only
  if (state.round === 1) runFirstPlayTooltips();
}

function prefetchNextRound() {
  // Fire-and-forget: starts downloading the next round during the reveal.
  // state.round is the *current* round; prefetch the NEXT one.
  if (state.round >= ROUNDS_PER_GAME) return;
  const nextIdx = state.round + 1;
  state._prefetchPromise = apiGetRound(nextIdx).catch(err => {
    state._prefetchPromise = null;
    throw err;
  });
}

// ──────────────────────────────────────────────────────────────
// First-play tooltips — shown once per user, then never again.
// Stored in localStorage under candleeye_first_play_done.
// ──────────────────────────────────────────────────────────────
const TOOLTIP_STATE = { timeouts: [], active: null };

function hasCompletedFirstPlay() {
  try { return localStorage.getItem('candleeye_first_play_done') === '1'; } catch (e) { return false; }
}
function markFirstPlayComplete() {
  try { localStorage.setItem('candleeye_first_play_done', '1'); } catch (e) {}
}

function clearAllTooltips() {
  TOOLTIP_STATE.timeouts.forEach(clearTimeout);
  TOOLTIP_STATE.timeouts = [];
  const existing = document.querySelectorAll('.ce-tooltip');
  existing.forEach(el => el.remove());
  TOOLTIP_STATE.active = null;
}

function showTooltip(text, anchorId, position = 'below') {
  clearAllTooltips();
  const anchor = document.getElementById(anchorId);
  if (!anchor) return;
  const rect = anchor.getBoundingClientRect();
  const screenRect = document.getElementById('screen').getBoundingClientRect();
  const tip = document.createElement('div');
  tip.className = 'ce-tooltip ' + (position === 'above' ? 'arrow-down' : 'arrow-up');
  tip.textContent = text;
  document.body.appendChild(tip);
  // Position relative to viewport
  const tipW = Math.min(260, screenRect.width - 40);
  tip.style.maxWidth = tipW + 'px';
  // Force layout to get height
  const tipH = tip.offsetHeight;
  let top, left;
  if (position === 'above') {
    top = rect.top + window.scrollY - tipH - 12;
  } else {
    top = rect.bottom + window.scrollY + 12;
  }
  // Horizontal: left-align to anchor but clamp within screen
  left = rect.left + window.scrollX;
  const maxLeft = screenRect.right + window.scrollX - tipW - 10;
  const minLeft = screenRect.left + window.scrollX + 10;
  if (left > maxLeft) left = maxLeft;
  if (left < minLeft) left = minLeft;
  tip.style.top = top + 'px';
  tip.style.left = left + 'px';
  // Fade in next tick
  requestAnimationFrame(() => tip.classList.add('visible'));
  TOOLTIP_STATE.active = tip;
}

function runFirstPlayTooltips() {
  if (hasCompletedFirstPlay()) return;
  // Wait 500ms after render for UI to settle, then show sequence
  const schedule = (delay, fn) => {
    TOOLTIP_STATE.timeouts.push(setTimeout(fn, delay));
  };
  schedule(500, () => showTooltip(t('tooltipTimer'), 'timer-txt', 'above'));
  schedule(3500, () => showTooltip(t('tooltipButtons'), 'btn-long', 'above'));
  schedule(6500, clearAllTooltips);
}

function startTimer() {
  clearInterval(state.timerHandle);
  state.timerStart = Date.now();
  state.timerHandle = setInterval(tick, 80);
}

function tick() {
  const elapsed = (Date.now() - state.timerStart) / 1000;
  const remaining = Math.max(0, ROUND_SECONDS - elapsed);
  const frac = remaining / ROUND_SECONDS;
  const bar = document.getElementById('timer-fill');
  const txt = document.getElementById('timer-txt');
  if (bar) {
    bar.style.width = (frac * 100) + '%';
    bar.style.background = frac < 0.3 ? '#FF8A7A' : frac < 0.6 ? '#FFB547' : '#FFD93D';
  }
  if (txt) txt.textContent = remaining.toFixed(1) + 's';

  // Show/hide big timer when we cross the 4s threshold
  const bigWrap = document.getElementById('chart-wrap');
  let big = document.getElementById('timer-big');
  if (remaining <= 4 && remaining > 0) {
    if (!big && bigWrap) {
      big = document.createElement('div');
      big.id = 'timer-big';
      big.className = 'timer-big';
      bigWrap.appendChild(big);
    }
    if (big) {
      big.textContent = Math.ceil(remaining);
      if (remaining <= 2) {
        big.classList.add('danger');
      } else {
        big.classList.remove('danger');
      }
    }
  } else if (big) {
    big.remove();
  }

  if (remaining <= 0) {
    clearInterval(state.timerHandle);
    state.timerHandle = null;
    if (big) big.remove();
    handleDecision(null);
  }
}

// Pause timer when tab goes to background (e.g. iOS lock screen)
document.addEventListener('visibilitychange', () => {
  if (!state.timerHandle && state._frozenRemaining == null) return;
  if (document.hidden) {
    const elapsed = (Date.now() - state.timerStart) / 1000;
    state._frozenRemaining = Math.max(0, ROUND_SECONDS - elapsed);
    clearInterval(state.timerHandle);
    state.timerHandle = null;
  } else if (state._frozenRemaining != null) {
    state.timerStart = Date.now() - (ROUND_SECONDS - state._frozenRemaining) * 1000;
    state._frozenRemaining = null;
    state.timerHandle = setInterval(tick, 80);
  }
});

async function handleDecision(decision) {
  clearInterval(state.timerHandle);
  state.timerHandle = null;
  clearAllTooltips();  // dismiss any first-play tooltip
  if (state.round === 1) markFirstPlayComplete();
  const big = document.getElementById('timer-big');
  if (big) big.remove();

  const msToDecide = Date.now() - state.currentStart;

  // Immediate UX: haptic tap + pulse chosen button
  if (decision !== null) {
    haptic(12);
    const chosenId = decision === 'long' ? 'btn-long' : 'btn-short';
    const chosen = document.getElementById(chosenId);
    if (chosen) chosen.classList.add('chosen');
  } else {
    haptic([20, 40, 20]);  // timeout: shorter triple-buzz
  }

  // disable both buttons
  const lb = document.getElementById('btn-long');
  const sb = document.getElementById('btn-short');
  if (lb) lb.disabled = true;
  if (sb) sb.disabled = true;

  try {
    const result = await apiDecide(state.current.round_id, decision, state.tfActive);
    const isTimeout = decision === null;
    const hit = !isTimeout && result.hit;

    let points;
    if (isTimeout || !hit) {
      points = -100;
      state.streak = 0;
    } else {
      state.streak++;
      points = Math.round(100 * streakMult(state.streak));
    }
    state.score += points;
    if (result.monkey_hit) state.monkeyScore += 100; else state.monkeyScore -= 100;

    // Outcome haptic + confetti
    if (hit) {
      // mild buzz on hit, stronger on streak hits
      if (state.streak >= 2) {
        haptic([20, 30, 30]);
        // confetti intensity 0.2 at streak 2, up to 1.0 at streak 5+
        const intensity = Math.min(1, 0.15 + (state.streak - 1) * 0.22);
        burstConfetti(intensity);
      } else {
        haptic(25);
      }
    } else {
      haptic([50, 30, 50]);  // sharper double-buzz on fail/timeout
    }

    // Future bars now come keyed by TF (each TF is its own game)
    const futureByTf = hydrateFutureByTf(result.future_bars_by_tf || {});
    const tfReveals = {};
    for (const tfName of ['1h', '4h', '1d']) {
      const tf = state.current.timeframes[tfName];
      if (!tf) continue;
      const future = futureByTf[tfName] || [];
      tfReveals[tfName] = {
        bars: tf.bars.concat(future),
        warmup_count: tf.warmup_count,
        context_count: tf.bars.length - tf.warmup_count,
        future_count: future.length,
      };
    }

    state.lastReveal = {
      tfReveals,
      tfBet: state.tfActive,  // TF the user was on when deciding = the TF of the bet
      hit,
      timeout: isTimeout,
      points,
      decision,
      truth: result.truth,
      symbol: result.symbol,
      decision_ts: result.decision_ts,
      exit_ts: result.exit_ts,
      entry_price: result.entry_price,
      exit_price: result.exit_price,
      pct_change: result.pct_change,
      ms_to_decide: msToDecide,
      streak_after: state.streak,
      score_after: state.score,
      monkey_decision: result.monkey_decision,
      monkey_hit: result.monkey_hit,
      monkey_sentiment_long_pct: result.monkey_sentiment_long_pct,
      monkey_hits_individual: result.monkey_hits_individual,
    };

    state.history.push({
      round_idx: state.round,
      symbol: result.symbol,
      start_ts: result.start_ts,
      decision_ts: result.decision_ts,
      exit_ts: result.exit_ts,
      entry_price: result.entry_price,
      exit_price: result.exit_price,
      pct_change: result.pct_change.toFixed(4),
      decision: decision || '',
      truth: result.truth,
      hit: hit,
      timeout: isTimeout,
      tf_used: state.tfActive,
      ms_to_decide: msToDecide,
      points: points,
      streak_after: state.streak,
      score_after: state.score,
      monkey_decision: result.monkey_decision,
      monkey_hit: result.monkey_hit,
    });

    renderReveal();
    prefetchNextRound();  // start loading next round in background during the 3s reveal
    setTimeout(() => nextRound(), 3000);
  } catch (err) {
    // Network/server failure on /decide: treat this round as a missed timeout
    // and continue to next round so the UX doesn't freeze. Preferable to
    // showing a dead end.
    console.warn('decide failed, treating as timeout:', err);
    state.streak = 0;
    state.score -= 100;
    state.history.push({
      round: state.round,
      symbol: state.current.symbol_anonymized || '●●●',
      hit: false,
      timeout: true,
      points: -100,
      decision: null,
      truth: null,
      _error: true,
    });
    // Skip the reveal; go straight to next round
    state._prefetchPromise = null;
    setTimeout(() => nextRound(), 500);
  }
}

// ──────────────────────────────────────────────────────────────
// Charts of the Day (COTD) — weekly state & persistence
// ──────────────────────────────────────────────────────────────
// Structure in localStorage.candleeye_cotd:
// {
//   "weekStart": "2026-04-20",         // Monday of current week, YYYY-MM-DD
//   "days": {
//     "2026-04-21": { played: true, hit: true },
//     ...
//   }
// }
// Production would fetch this from a Binance user profile instead.
function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getUTCDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setUTCDate(d.getUTCDate() + diff);
  return d.toISOString().slice(0, 10);
}
function getSundayOfWeek(date) {
  const monday = new Date(getMondayOfWeek(date) + 'T00:00:00Z');
  monday.setUTCDate(monday.getUTCDate() + 6);
  return monday.toISOString().slice(0, 10);
}
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function getCOTDState() {
  const today = todayISO();
  const weekStart = getMondayOfWeek(today);
  let st;
  try { st = JSON.parse(localStorage.getItem('candleeye_cotd') || '{}'); }
  catch (e) { st = {}; }
  // New week: reset
  if (st.weekStart !== weekStart) {
    st = { weekStart, days: {} };
    try { localStorage.setItem('candleeye_cotd', JSON.stringify(st)); } catch (e) {}
  }
  if (!st.days) st.days = {};
  return st;
}
function recordCOTDResult(hit) {
  const st = getCOTDState();
  const today = todayISO();
  st.days[today] = { played: true, hit: hit };
  try { localStorage.setItem('candleeye_cotd', JSON.stringify(st)); } catch (e) {}
  return st;
}
function countCOTDWins() {
  const st = getCOTDState();
  return Object.values(st.days).filter(d => d.hit).length;
}
function countCOTDPlayed() {
  const st = getCOTDState();
  return Object.keys(st.days).length;
}
function hasCOTDPlayedToday() {
  const st = getCOTDState();
  return !!st.days[todayISO()];
}
function msUntilNextDay() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setUTCDate(tomorrow.getUTCDate() + 1);
  tomorrow.setUTCHours(0, 0, 0, 0);
  return tomorrow.getTime() - now.getTime();
}
function formatCountdown(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return { h, m, s: sec };
}

    const int = setInterval(() => {
      if (!document.getElementById('countdown-text')) { clearInterval(int); return; }
      updateCountdown();
    }, 1000);
  }

// Monte Carlo percentile (client-side, replicates scoring)
function percentileVsMonkeys(userScore, trials) {
  trials = trials || 3000;
  const pLong = window.__LONG_BIAS__ || 0.5;
  let beat = 0;
  for (let t = 0; t < trials; t++) {
    let s = 0, streak = 0;
    for (let r = 0; r < ROUNDS_PER_GAME; r++) {
      // Monkey: long with prob pLong; hit randomly with ~50% since its direction is uncorrelated with truth
      const hit = Math.random() < 0.5;
      if (hit) { streak++; s += Math.round(100 * streakMult(streak)); }
      else { s -= 100; streak = 0; }
    }
    if (userScore > s) beat++;
  }
  return Math.round((beat / trials) * 100);
}

function buildShareText() {
  const st = getCOTDState();
  const todayData = st.days[todayISO()];
  const lastSessionHits = state.history.filter(h => h.hit).length;
  const total = state.history.length || 5;

  // Emoji line: gold for hit, gray for miss
  const emojis = state.history.map(h => h.hit ? '🟡' : '⬛').join('');
  const score = state.history.length ? `${lastSessionHits}/${total}` : '—';

  // Example output:
  //   Charts of the Day · 21/04 · 3/5
  //   🟡🟡⬛🟡⬛
  //   Esta semana: ◼◼◻◻◻◻◻
  const weekGrid = t('cotdWeekdays').map((_, i) => {
    const d = new Date(st.weekStart + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + i);
    const iso = d.toISOString().slice(0, 10);
    const dayData = st.days[iso];
    if (!dayData) return '◻';
    return dayData.hit ? '◼' : '◽';
  }).join('');

  const shortDate = todayISO().slice(5);  // MM-DD
  const line1 = `${t('cotdName')} · ${shortDate} · ${score}`;
  const line2 = emojis;
  const line3 = `${t('cotdWeekdays').join(' ')}`;
  const line4 = weekGrid;
  return `${line1}\n${line2}\n\n${line3}\n${line4}`;
}

          ${t('cotdShareButton')}
        </div>
        <div style="font-size:13px; color:var(--text-dim); margin-top:8px;">
          ${t('cotdShareTitle')}
        </div>
      </div>

      <!-- Share preview (the text that will be copied/shared) -->
      <div class="card" style="margin-top:24px;">
        <pre id="share-text-preview" style="font-family:inherit; font-size:14px; color:var(--text); white-space:pre-wrap; word-wrap:break-word; margin:0; line-height:1.7;">${shareText}</pre>
      </div>

      <!-- CTAs -->
      <div style="display:grid; grid-template-columns:1fr; gap:10px; margin-top:20px;">
        <button class="btn btn-primary" id="native-share-btn" style="padding:14px 0; font-size:15px;">
          ${t('cotdShareButton')}
        </button>
        <button class="btn btn-ghost" id="copy-share-btn" style="padding:14px 0; font-size:14px;">
          ${t('lang') === 'ES' ? 'Copiar' : t('lang') === 'ZH' ? '复制' : 'Copy'}
        </button>
        <button class="btn btn-ghost" id="back-home-btn" style="padding:12px 0; font-size:13px; opacity:0.7;">
          ${t('home')}
        </button>
      </div>

      <div id="copy-confirm" style="text-align:center; margin-top:12px; color:var(--amber); font-size:12px; opacity:0; transition:opacity 0.3s;">
        ✓
      </div>
    </div>
  `;
  document.getElementById('close-share').addEventListener('click', renderHome);
  document.getElementById('back-home-btn').addEventListener('click', renderHome);

  const showCopied = () => {
    const el = document.getElementById('copy-confirm');
    if (!el) return;
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 1500);
  };

  const copyToClipboard = async (text) => {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        showCopied();
      } else {
        // Fallback: use a temporary textarea
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.top = '-1000px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showCopied(); } catch (e) {}
        document.body.removeChild(ta);
      }
    } catch (e) { console.error(e); }
  };

  document.getElementById('copy-share-btn').addEventListener('click', () => {
    copyToClipboard(shareText);
  });

  // Native Web Share API (iOS, Android)
  document.getElementById('native-share-btn').addEventListener('click', async () => {
    if (navigator.share) {
      try {
        await navigator.share({
          title: t('cotdName'),
          text: shareText,
        });
      } catch (e) {
        // User cancelled or failed — fallback to copy
        copyToClipboard(shareText);
      }
    } else {
      // No native share API (desktop) — just copy
      copyToClipboard(shareText);
    }
  });
}

// Boot
// ──────────────────────────────────────────────────────────────
fetch('/meta').then(r => r.json()).then(m => {
  window.__LONG_BIAS__ = m.long_bias;
});
setLang(detectLang());
setTheme(detectTheme());
state.mode = detectMode();
document.documentElement.setAttribute('data-mode', state.mode);

// Onboarding: show mandatory how-to first time, then home
function hasSeenOnboarding() {
  try { return localStorage.getItem('cotd_onboarded') === '1'; } catch (e) { return false; }
}
function markOnboarded() {
  try { localStorage.setItem('cotd_onboarded', '1'); } catch (e) {}
}

if (!hasSeenOnboarding()) {
  renderHome();  // render home in background so it's ready behind the modal
  renderHowToPlay(() => { markOnboarded(); });
} else {
  renderHome();
}
</script>
</body>
</html>
