<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Nunito', system-ui, sans-serif;
    background: #0B0E11;
    color: #EAECEF;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    padding: max(12px, env(safe-area-inset-top)) 10px max(20px, env(safe-area-inset-bottom)) 10px;
    position: relative;
    overflow-x: hidden;
  }
  /* Decorative golden arcs, WOTD-style */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 900px;
    border: 1px solid rgba(240, 185, 11, 0.12);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    border: 1px solid rgba(240, 185, 11, 0.2);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  #root { width: 100%; max-width: 520px; margin: 0 auto; position: relative; z-index: 1; }

  h1, .display { font-family: 'Fraunces', 'Georgia', serif; font-weight: 700; letter-spacing: -0.02em; }

  .card {
    background: #1E2026;
    border: 1px solid #2B3139;
    border-radius: 16px;
    padding: 18px 16px;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 18px;
    padding: 18px 0;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.08s, opacity 0.2s;
    letter-spacing: 0.02em;
    color: #0B0E11;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* Trading buttons keep green/red (market colors) */
  .btn-long { background: #0ECB81; color: #FFFFFF; }
  .btn-short { background: #F6465D; color: #FFFFFF; }
  .btn-primary { background: #F0B90B; color: #0B0E11; }
  .btn-ghost { background: transparent; color: #EAECEF; border: 1px solid #2B3139; }

  /* Outcomes: gold (hit) / slate-blue (miss) — preserve from CandleEye philosophy */
  .hit-bg { background: #F0B90B; color: #0B0E11; }
  .hit-fg { color: #F0B90B; }
  .miss-bg { background: #5E6673; color: #EAECEF; }
  .miss-fg { color: #848E9C; }

  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #2B3139; border: 1.5px solid #3C434D;
    transition: background 0.25s, transform 0.25s;
  }
  .dot.hit { background: #F0B90B; border-color: #F0B90B; }
  .dot.miss { background: #5E6673; border-color: #5E6673; }
  .dot.active { background: #F0B90B; opacity: 0.5; box-shadow: 0 0 0 3px rgba(240,185,11,0.25); }

  .chip {
    display: inline-block; font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px;
    background: #1E2026; color: #EAECEF; margin: 3px;
    border: 1px solid #2B3139;
  }

  .tf-group {
    display: inline-flex; background: #1E2026; border: 1px solid #2B3139;
    border-radius: 10px; padding: 2px; gap: 2px;
  }
  .tf-btn {
    font-family: 'Nunito'; font-weight: 700; font-size: 12px;
    padding: 4px 10px; border: none; background: transparent;
    color: #848E9C; cursor: pointer; border-radius: 8px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background 0.12s, color 0.12s;
  }
  .tf-btn.tf-active {
    background: #F0B90B; color: #0B0E11;
  }
  .tf-btn:disabled { cursor: not-allowed; }
  .tf-btn.tf-locked { opacity: 0.35; }

  .lang-group {
    display: inline-flex; background: #1E2026; border: 1px solid #2B3139;
    border-radius: 10px; padding: 2px; gap: 2px;
  }
  .lang-btn {
    font-family: 'Nunito', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    font-weight: 700; font-size: 12px;
    padding: 5px 12px; border: none; background: transparent;
    color: #848E9C; cursor: pointer; border-radius: 8px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    transition: background 0.12s, color 0.12s;
  }
  .lang-btn.lang-active {
    background: #F0B90B; color: #0B0E11;
  }

  /* First-play tooltips */
  .ce-tooltip {
    position: absolute; z-index: 1000;
    background: #2C3E50; color: #FFFBF5;
    font-family: 'Nunito', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 10px 14px; border-radius: 10px;
    max-width: 260px; line-height: 1.35;
    box-shadow: 0 4px 16px rgba(44,62,80,0.25);
    opacity: 0; transform: translateY(-4px);
    transition: opacity 180ms ease, transform 180ms ease;
    pointer-events: none;
  }
  .ce-tooltip.visible { opacity: 1; transform: translateY(0); }
  .ce-tooltip::before {
    content: ''; position: absolute;
    width: 0; height: 0;
    border-style: solid;
  }
  .ce-tooltip.arrow-up::before {
    top: -8px; left: 24px;
    border-width: 0 8px 10px 8px;
    border-color: transparent transparent #2C3E50 transparent;
  }
  .ce-tooltip.arrow-down::before {
    bottom: -8px; left: 24px;
    border-width: 10px 8px 0 8px;
    border-color: #2C3E50 transparent transparent transparent;
  }

  @keyframes pop {
    0% { transform: scale(0.85); opacity: 0; }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.4s cubic-bezier(0.2, 0.8, 0.4, 1.2) both; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-4px); }
    40%, 80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.35s both; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.28s ease-out both; }

  /* Button "chosen" pulse — fires right after user taps, before reveal arrives */
  @keyframes chosenPulse {
    0% { transform: translateY(3px) scale(1); box-shadow: 0 1px 0 #2C3E50; }
    40% { transform: translateY(0) scale(1.04); box-shadow: 0 6px 0 #2C3E50, 0 0 0 6px rgba(255,217,61,0.35); }
    100% { transform: translateY(0) scale(1); box-shadow: 0 4px 0 #2C3E50; }
  }
  .chosen { animation: chosenPulse 0.45s ease-out both; }

  /* Timer-big: appears in last 4s, over the chart */
  .timer-big {
    position: absolute; top: 10px; right: 10px;
    background: #FFD93D; color: #2C3E50;
    font-family: 'Fraunces', serif; font-weight: 700;
    font-size: 40px; line-height: 1;
    padding: 8px 14px; border-radius: 12px;
    border: 2px solid #2C3E50;
    box-shadow: 0 3px 0 #2C3E50;
    pointer-events: none;
    animation: timerPulse 0.6s ease-in-out infinite alternate;
  }
  .timer-big.danger { background: #FF8A7A; color: #2C3E50; animation-duration: 0.3s; }
  @keyframes timerPulse {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }

  /* Count-up number animation — pops when score updates */
  @keyframes scoreBump {
    0% { transform: scale(1); color: #EAECEF; }
    40% { transform: scale(1.25); color: #F0B90B; }
    100% { transform: scale(1); color: #EAECEF; }
  }
  .score-bump { animation: scoreBump 0.5s ease-out both; }
  @keyframes scoreBumpMiss {
    0% { transform: scale(1); color: #EAECEF; }
    30% { transform: scale(0.92); color: #848E9C; }
    100% { transform: scale(1); color: #EAECEF; }
  }
  .score-bump-miss { animation: scoreBumpMiss 0.45s ease-out both; }

  /* Confetti container — absolute overlay */
  #confetti-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden;
  }
  .confetti {
    position: absolute; width: 10px; height: 14px;
    top: -20px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .timer-bar { height: 6px; border-radius: 3px; background: #2B3139; overflow: hidden; }
  .timer-fill { height: 100%; background: #F0B90B; transition: width 0.1s linear, background 0.2s; }

  #chart-wrap {
    background: #FFFFFF;
    border-radius: 12px;
    border: 1px solid #2B3139;
    overflow: hidden;
    position: relative;
    aspect-ratio: 420 / 520;
    width: 100%;
  }

  .meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #848E9C; }

  .link-btn {
    background: none; border: none; color: #848E9C; text-decoration: underline;
    font-family: 'Nunito'; font-size: 13px; cursor: pointer; padding: 0;
  }

  table.trades { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.trades th, table.trades td { padding: 6px 4px; text-align: left; border-bottom: 1px solid #2B3139; }
  table.trades th { font-weight: 700; color: #848E9C; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; }
  table.trades td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .status-pill { padding: 2px 8px; border-radius: 999px; font-weight: 700; font-size: 11px; }
  .pill-hit { background: #F0B90B; color: #0B0E11; }
  .pill-miss { background: #5E6673; color: #FFFFFF; }
</style>

function detectLang() {
  // localStorage wins
  try {
    const saved = localStorage.getItem('candleeye_lang');
    if (saved && I18N[saved]) return saved;
  } catch (e) {}
  // Fallback: navigator
  const nav = (navigator.language || 'es').toLowerCase();
  if (nav.startsWith('zh')) return 'zh';
  if (nav.startsWith('en')) return 'en';
  return 'es';
}
function setLang(code) {
  if (!I18N[code]) return;
  state.lang = code;
  try { localStorage.setItem('candleeye_lang', code); } catch (e) {}
}
function t(key) {
  const dict = I18N[state.lang] || I18N.es;
  const fallback = I18N.es;
  return dict[key] !== undefined ? dict[key] : fallback[key];
}
function formatDate(iso) {
  const d = new Date(iso);
  const dict = I18N[state.lang] || I18N.es;
  return dict.formatDate(d, dict.months);
}

// ──────────────────────────────────────────────────────────────
// Confetti (small celebration only for streak hits ≥ 2)
// Intensity scales with streak: subtle at ×1.2, big at ×2.5.
// ──────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#FFD93D', '#F0B847', '#B8860B', '#7BD389', '#FFFBF5'];
function burstConfetti(intensity) {
  const layer = document.getElementById('confetti-layer');
  if (!layer) return;
  const n = Math.round(12 + intensity * 40); // 12 to ~52
  const vw = window.innerWidth;
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const color = CONFETTI_COLORS[i % CONFETTI_COLORS.length];
    const startX = vw * 0.5 + (Math.random() - 0.5) * vw * 0.9;
    const drift = (Math.random() - 0.5) * 200;
    const dur = 1.4 + Math.random() * 1.4;
    const delay = Math.random() * 0.2;
    const rot = Math.random() * 360;
    el.style.left = startX + 'px';
    el.style.background = color;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = delay + 's';
    el.style.transform = `translateX(${drift}px) rotate(${rot}deg)`;
    layer.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 100);
  }
}

// ──────────────────────────────────────────────────────────────
// Indicator math
// ──────────────────────────────────────────────────────────────
function sma(bars, period, field) {
  field = field || 'c';
  const out = new Array(bars.length).fill(null);
  let sum = 0;
  for (let i = 0; i < bars.length; i++) {
    sum += bars[i][field];
    if (i >= period) sum -= bars[i - period][field];
    if (i >= period - 1) out[i] = sum / period;
  }
  return out;
}

// ──────────────────────────────────────────────────────────────
// Chart (light background, Binance-web-style)
//
// Bars layout (index-wise):
//   [0                  warmup-1][warmup ... warmup+context-1][future...]
//   ▲ SMAs computed from here      ▲ context visible           ▲ future (if showAll)
//
// Horizontally, the SVG is divided so the future occupies 37.5% of the x-axis
// from the start — even when we haven't revealed it yet — so the composition
// doesn't shift on reveal.
// ──────────────────────────────────────────────────────────────
function renderChart(allBars, warmupCount, contextBars, futureBars, showAll) {
  // allBars includes warmup + context (always) and future (only if showAll)
  const contextEnd = warmupCount + contextBars;
  const visibleFrom = warmupCount;
  const visibleTo = showAll ? allBars.length : contextEnd;

  const W = 420, H = 520;
  const padL = 8, padR = 8;
  const priceTop = 14, priceBot = 420;
  const volTop = 434, volBot = 500;

  // SMAs computed over ALL bars (warmup + context + future if any)
  const s50  = sma(allBars, 50);
  const s200 = sma(allBars, 200);

  // Price range auto-scales to include OHLC + visible SMAs (TradingView/Binance behavior).
  // Without this, SMA 200 often falls outside the visible range, which looks like a bug
  // to novices even though it's technically correct.
  let minP = Infinity, maxP = -Infinity, maxV = 0;
  for (let i = visibleFrom; i < visibleTo; i++) {
    const b = allBars[i]; if (!b) continue;
    if (b.l < minP) minP = b.l;
    if (b.h > maxP) maxP = b.h;
    if (b.v > maxV) maxV = b.v;
    // Include SMA values in the range too
    if (s50[i] != null) {
      if (s50[i] < minP) minP = s50[i];
      if (s50[i] > maxP) maxP = s50[i];
    }
    if (s200[i] != null) {
      if (s200[i] < minP) minP = s200[i];
      if (s200[i] > maxP) maxP = s200[i];
    }
  }
  const padP = (maxP - minP) * 0.08;
  minP -= padP; maxP += padP;

  // X-axis layout: always reserve contextBars + futureBars slots in the usable width,
  // so context occupies 62.5% and future occupies 37.5% — even when future is blank.
  const slotsTotal = contextBars + futureBars;
  const usableW = W - padL - padR;
  const barW = usableW / slotsTotal;

  // Map a bar global index to x-coordinate.
  // Global index `warmup+k` corresponds to slot k on screen (0..CONTEXT+FUTURE-1).
  const xAt = (globalIdx) => {
    const slot = globalIdx - visibleFrom;  // 0 at first context bar
    return padL + slot * barW + barW / 2;
  };
  const yPrice = p => priceTop + (priceBot - priceTop) * (1 - (p - minP) / (maxP - minP));
  const yVol = v => volBot - (volBot - volTop) * (v / maxV);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block; width:100%; height:auto;">`;

  // Backgrounds (white main, slightly cream vol panel)
  svg += `<rect x="0" y="0" width="${W}" height="${H}" fill="#FFFFFF"/>`;
  svg += `<rect x="0" y="${volTop-2}" width="${W}" height="${volBot-volTop+4}" fill="#FBF7EE"/>`;

  // Subtle horizontal grid in price area
  for (let i = 1; i < 4; i++) {
    const y = priceTop + (priceBot - priceTop) * i / 4;
    svg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}" stroke="#E8E2D3" stroke-width="0.5"/>`;
  }

  // SMAs — draw only segments that fall inside the visible price range.
  // If the SMA is entirely off-screen in the visible window, mark it in the
  // legend so the user knows it exists but just isn't here.
  function drawSMA(arr, color, width) {
    let d = '';
    let segmentsDrawn = 0;
    let anyInRange = false;
    for (let i = visibleFrom; i < visibleTo; i++) {
      const v = arr[i];
      if (v === null || v === undefined) continue;
      // is this value inside the visible price range?
      const inRange = v >= minP && v <= maxP;
      if (inRange) {
        anyInRange = true;
        const y = yPrice(v);
        d += (d === '' ? 'M' : 'L') + xAt(i).toFixed(1) + ' ' + y.toFixed(1) + ' ';
      } else if (d !== '') {
        // broke the segment — flush what we have and start fresh next inRange
        svg += `<path d="${d}" stroke="${color}" stroke-width="${width}" fill="none" opacity="0.95" stroke-linejoin="round"/>`;
        d = '';
        segmentsDrawn++;
      }
    }
    if (d !== '') {
      svg += `<path d="${d}" stroke="${color}" stroke-width="${width}" fill="none" opacity="0.95" stroke-linejoin="round"/>`;
      segmentsDrawn++;
    }
    return anyInRange;
  }
  const sma50InRange = drawSMA(s50,  '#D14B9A', 2);
  const sma200InRange = drawSMA(s200, '#3A7AC8', 2.2);

  // Candles + volume — combined into 6 <path> elements (2 per layer × 2 colors).
  // This reduces node count from ~400 to 6 per chart, huge win on mobile Safari.
  const candleW = Math.max(2.5, barW * 0.72);
  const wickW = Math.max(1, barW * 0.12);
  const halfCandle = candleW / 2;

  let wickUpD = '', wickDnD = '';
  let bodyUpD = '', bodyDnD = '';
  let volUpD = '', volDnD = '';

  for (let i = visibleFrom; i < visibleTo; i++) {
    const b = allBars[i]; if (!b) continue;
    const x = xAt(i);
    const up = b.c >= b.o;
    const yH = yPrice(b.h), yL = yPrice(b.l);
    const yTop = yPrice(Math.max(b.o, b.c));
    const yBot = yPrice(Math.min(b.o, b.c));
    const bodyH = Math.max(1, yBot - yTop);
    const vy = yVol(b.v);
    const volH = volBot - vy;
    const xLeft = x - halfCandle;

    // Wick as "M x,yH L x,yL"
    const wickSeg = 'M' + x.toFixed(1) + ' ' + yH.toFixed(1) + 'L' + x.toFixed(1) + ' ' + yL.toFixed(1);
    // Body as rect-equivalent path "M xLeft,yTop h w v h h -w Z"
    const bodySeg = 'M' + xLeft.toFixed(1) + ' ' + yTop.toFixed(1) +
                    'h' + candleW.toFixed(1) + 'v' + bodyH.toFixed(1) +
                    'h' + (-candleW).toFixed(1) + 'Z';
    const volSeg = 'M' + xLeft.toFixed(1) + ' ' + vy.toFixed(1) +
                   'h' + candleW.toFixed(1) + 'v' + volH.toFixed(1) +
                   'h' + (-candleW).toFixed(1) + 'Z';

    if (up) {
      wickUpD += wickSeg;
      bodyUpD += bodySeg;
      volUpD += volSeg;
    } else {
      wickDnD += wickSeg;
      bodyDnD += bodySeg;
      volDnD += volSeg;
    }
  }

  // Order: volumes first (they're below), then bodies, then wicks on top.
  if (volUpD) svg += `<path d="${volUpD}" fill="#26A69A" opacity="0.55"/>`;
  if (volDnD) svg += `<path d="${volDnD}" fill="#EF5350" opacity="0.55"/>`;
  if (wickUpD) svg += `<path d="${wickUpD}" stroke="#26A69A" stroke-width="${wickW.toFixed(1)}" stroke-linecap="round" fill="none"/>`;
  if (wickDnD) svg += `<path d="${wickDnD}" stroke="#EF5350" stroke-width="${wickW.toFixed(1)}" stroke-linecap="round" fill="none"/>`;
  if (bodyUpD) svg += `<path d="${bodyUpD}" fill="#26A69A"/>`;
  if (bodyDnD) svg += `<path d="${bodyDnD}" fill="#EF5350"/>`;

  // Decision marker + future zone
  const decisionGlobalIdx = contextEnd - 1;
  const decisionX = xAt(decisionGlobalIdx) + barW / 2;

  if (showAll) {
    // Dotted vertical line at decision point
    svg += `<line x1="${decisionX.toFixed(1)}" y1="${priceTop}" x2="${decisionX.toFixed(1)}" y2="${volBot}" stroke="#2C3E50" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>`;
    // entry price horizontal guide
    const entryY = yPrice(allBars[decisionGlobalIdx].c);
    svg += `<line x1="${padL}" y1="${entryY.toFixed(1)}" x2="${W - padR}" y2="${entryY.toFixed(1)}" stroke="#B8860B" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>`;
  } else {
    // Reserved future zone — slightly cream, with a dotted vertical boundary
    svg += `<rect x="${decisionX.toFixed(1)}" y="0" width="${(W - decisionX).toFixed(1)}" height="${H}" fill="#F5EFE0" opacity="0.55"/>`;
    svg += `<line x1="${decisionX.toFixed(1)}" y1="${priceTop}" x2="${decisionX.toFixed(1)}" y2="${volBot}" stroke="#2C3E50" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"/>`;
    const midX = decisionX + (W - decisionX) / 2;
    const midY = (priceTop + priceBot) / 2;
    svg += `<text x="${midX.toFixed(1)}" y="${(midY + 10).toFixed(1)}" text-anchor="middle" fill="#8A95A8" font-family="Georgia, serif" font-size="36" font-weight="800">?</text>`;
  }

  // SMA legend (top-left, discreet). SMAs are always in range now thanks to auto-scale.
  const legendW = 68;
  svg += `<g font-family="Nunito" font-size="9" font-weight="700">`;
  svg += `<rect x="${padL}" y="${priceTop}" width="${legendW}" height="30" fill="#FFFFFF" opacity="0.88"/>`;
  svg += `<line x1="${padL + 4}" y1="${priceTop + 9}" x2="${padL + 18}" y2="${priceTop + 9}" stroke="#D14B9A" stroke-width="2"/>`;
  svg += `<text x="${padL + 22}" y="${priceTop + 12}" fill="#5A6A85">SMA 50</text>`;
  svg += `<line x1="${padL + 4}" y1="${priceTop + 23}" x2="${padL + 18}" y2="${priceTop + 23}" stroke="#3A7AC8" stroke-width="2.2"/>`;
  svg += `<text x="${padL + 22}" y="${priceTop + 26}" fill="#5A6A85">SMA 200</text>`;
  svg += `</g>`;

  // Vol label
  svg += `<text x="${padL}" y="${volTop + 12}" fill="#8A95A8" font-family="Nunito" font-size="9" font-weight="700">VOL</text>`;

  svg += `</svg>`;
  return svg;
}

// ──────────────────────────────────────────────────────────────
// API
// ──────────────────────────────────────────────────────────────
async function apiGetRound(overrideIndex) {
  // COTD mode: fetch today's chart N.
  // For main flow, state.round has just been incremented (1..5), so use it.
  // For prefetch, pass overrideIndex explicitly (next round).
  const idx = overrideIndex != null ? overrideIndex : state.round;
  const clamped = Math.max(1, Math.min(5, idx));
  const r = await fetch(`/daily/${clamped}`);
  if (!r.ok) throw new Error('round fetch failed');
  return r.json();
}

async function apiDecide(roundId, decision, tfUsed) {
  const r = await fetch('/decide', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({round_id: roundId, decision, tf_used: tfUsed}),
  });
  if (!r.ok) throw new Error('decide failed');
  return r.json();
}

async function apiSaveSession(rounds) {
  const r = await fetch('/session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({rounds}),
  });
  return r.json();
}

// ──────────────────────────────────────────────────────────────
// Game flow
// ──────────────────────────────────────────────────────────────
function startGame() {
  state.round = 0;
  state.score = 0;
  state.streak = 0;
  state.history = [];
  state.monkeyScore = 0;
  state._prefetchPromise = null;
  nextRound();
}

// Hydrate compact bar arrays [o,h,l,c,v] into {o,h,l,c,v} objects the chart expects.
function hydrateBars(arr) {
  const out = new Array(arr.length);
  for (let i = 0; i < arr.length; i++) {
    const b = arr[i];
    out[i] = { o: b[0], h: b[1], l: b[2], c: b[3], v: b[4] };
  }
  return out;
}
function hydrateRound(data) {
  if (data && data.timeframes) {
    for (const tfName in data.timeframes) {
      const tf = data.timeframes[tfName];
      if (tf && Array.isArray(tf.bars) && tf.bars.length > 0 && Array.isArray(tf.bars[0])) {
        tf.bars = hydrateBars(tf.bars);
      }
    }
    // Pre-render the 3 ciego SVGs once — avoids re-rendering on each TF switch.
    data._svgCache = {};
    for (const tfName in data.timeframes) {
      const tf = data.timeframes[tfName];
      const contextCount = tf.bars.length - tf.warmup_count;
      data._svgCache[tfName] = renderChart(
        tf.bars, tf.warmup_count, contextCount, tf.future_count, false
      );
    }
  }
  return data;
}
function hydrateFutureByTf(byTf) {
  const out = {};
  for (const tfName in byTf) {
    const arr = byTf[tfName];
    if (Array.isArray(arr) && arr.length > 0 && Array.isArray(arr[0])) {
      out[tfName] = hydrateBars(arr);
    } else {
      out[tfName] = arr || [];
    }
  }
  return out;
}

async function nextRound() {
  if (state.round >= ROUNDS_PER_GAME) {
    showSummary();
    return;
  }
  state.round++;

  // Use prefetched data if available; otherwise fetch now
  let data;
  if (state._prefetchPromise) {
    renderLoading();
    try {
      data = await state._prefetchPromise;
    } catch (err) {
      screen.innerHTML = `<div class="card"><p>Error de red: ${err.message}</p></div>`;
      return;
    }
    state._prefetchPromise = null;
  } else {
    renderLoading();
    try {
      data = await apiGetRound();
    } catch (err) {
      screen.innerHTML = `<div class="card"><p>Error de red: ${err.message}</p></div>`;
      return;
    }
  }

  hydrateRound(data);
  state.current = data;
  state.tfActive = '1h';
  state.currentStart = Date.now();
  renderPlay();
  startTimer();
  // First-ever play: show tooltips on round 1 only
  if (state.round === 1) runFirstPlayTooltips();
}

function prefetchNextRound() {
  // Fire-and-forget: starts downloading the next round during the reveal.
  // state.round is the *current* round; prefetch the NEXT one.
  if (state.round >= ROUNDS_PER_GAME) return;
  const nextIdx = state.round + 1;
  state._prefetchPromise = apiGetRound(nextIdx).catch(err => {
    state._prefetchPromise = null;
    throw err;
  });
}

// ──────────────────────────────────────────────────────────────
// First-play tooltips — shown once per user, then never again.
// Stored in localStorage under candleeye_first_play_done.
// ──────────────────────────────────────────────────────────────
const TOOLTIP_STATE = { timeouts: [], active: null };

function hasCompletedFirstPlay() {
  try { return localStorage.getItem('candleeye_first_play_done') === '1'; } catch (e) { return false; }
}
function markFirstPlayComplete() {
  try { localStorage.setItem('candleeye_first_play_done', '1'); } catch (e) {}
}

function clearAllTooltips() {
  TOOLTIP_STATE.timeouts.forEach(clearTimeout);
  TOOLTIP_STATE.timeouts = [];
  const existing = document.querySelectorAll('.ce-tooltip');
  existing.forEach(el => el.remove());
  TOOLTIP_STATE.active = null;
}

function showTooltip(text, anchorId, position = 'below') {
  clearAllTooltips();
  const anchor = document.getElementById(anchorId);
  if (!anchor) return;
  const rect = anchor.getBoundingClientRect();
  const screenRect = document.getElementById('screen').getBoundingClientRect();
  const tip = document.createElement('div');
  tip.className = 'ce-tooltip ' + (position === 'above' ? 'arrow-down' : 'arrow-up');
  tip.textContent = text;
  document.body.appendChild(tip);
  // Position relative to viewport
  const tipW = Math.min(260, screenRect.width - 40);
  tip.style.maxWidth = tipW + 'px';
  // Force layout to get height
  const tipH = tip.offsetHeight;
  let top, left;
  if (position === 'above') {
    top = rect.top + window.scrollY - tipH - 12;
  } else {
    top = rect.bottom + window.scrollY + 12;
  }
  // Horizontal: left-align to anchor but clamp within screen
  left = rect.left + window.scrollX;
  const maxLeft = screenRect.right + window.scrollX - tipW - 10;
  const minLeft = screenRect.left + window.scrollX + 10;
  if (left > maxLeft) left = maxLeft;
  if (left < minLeft) left = minLeft;
  tip.style.top = top + 'px';
  tip.style.left = left + 'px';
  // Fade in next tick
  requestAnimationFrame(() => tip.classList.add('visible'));
  TOOLTIP_STATE.active = tip;
}

function runFirstPlayTooltips() {
  if (hasCompletedFirstPlay()) return;
  // Wait 500ms after render for UI to settle, then show sequence
  const schedule = (delay, fn) => {
    TOOLTIP_STATE.timeouts.push(setTimeout(fn, delay));
  };
  schedule(500, () => showTooltip(t('tooltipTimer'), 'timer-txt', 'above'));
  schedule(3500, () => showTooltip(t('tooltipButtons'), 'btn-long', 'above'));
  schedule(6500, () => showTooltip(t('tooltipMonkey'), 'monkey-long-bar', 'above'));
  schedule(9500, clearAllTooltips);
}

function startTimer() {
  clearInterval(state.timerHandle);
  state.timerStart = Date.now();
  state.timerHandle = setInterval(tick, 80);
}

function tick() {
  const elapsed = (Date.now() - state.timerStart) / 1000;
  const remaining = Math.max(0, ROUND_SECONDS - elapsed);
  const frac = remaining / ROUND_SECONDS;
  const bar = document.getElementById('timer-fill');
  const txt = document.getElementById('timer-txt');
  if (bar) {
    bar.style.width = (frac * 100) + '%';
    bar.style.background = frac < 0.3 ? '#FF8A7A' : frac < 0.6 ? '#FFB547' : '#FFD93D';
  }
  if (txt) txt.textContent = remaining.toFixed(1) + 's';

  // Show/hide big timer when we cross the 4s threshold
  const bigWrap = document.getElementById('chart-wrap');
  let big = document.getElementById('timer-big');
  if (remaining <= 4 && remaining > 0) {
    if (!big && bigWrap) {
      big = document.createElement('div');
      big.id = 'timer-big';
      big.className = 'timer-big';
      bigWrap.appendChild(big);
    }
    if (big) {
      big.textContent = Math.ceil(remaining);
      if (remaining <= 2) {
        big.classList.add('danger');
      } else {
        big.classList.remove('danger');
      }
    }
  } else if (big) {
    big.remove();
  }

  if (remaining <= 0) {
    clearInterval(state.timerHandle);
    state.timerHandle = null;
    if (big) big.remove();
    handleDecision(null);
  }
}

// Pause timer when tab goes to background (e.g. iOS lock screen)
document.addEventListener('visibilitychange', () => {
  if (!state.timerHandle && state._frozenRemaining == null) return;
  if (document.hidden) {
    const elapsed = (Date.now() - state.timerStart) / 1000;
    state._frozenRemaining = Math.max(0, ROUND_SECONDS - elapsed);
    clearInterval(state.timerHandle);
    state.timerHandle = null;
  } else if (state._frozenRemaining != null) {
    state.timerStart = Date.now() - (ROUND_SECONDS - state._frozenRemaining) * 1000;
    state._frozenRemaining = null;
    state.timerHandle = setInterval(tick, 80);
  }
});

async function handleDecision(decision) {
  clearInterval(state.timerHandle);
  state.timerHandle = null;
  clearAllTooltips();  // dismiss any first-play tooltip
  if (state.round === 1) markFirstPlayComplete();
  const big = document.getElementById('timer-big');
  if (big) big.remove();

  const msToDecide = Date.now() - state.currentStart;

  // Immediate UX: haptic tap + pulse chosen button
  if (decision !== null) {
    haptic(12);
    const chosenId = decision === 'long' ? 'btn-long' : 'btn-short';
    const chosen = document.getElementById(chosenId);
    if (chosen) chosen.classList.add('chosen');
  } else {
    haptic([20, 40, 20]);  // timeout: shorter triple-buzz
  }

  // disable both buttons
  const lb = document.getElementById('btn-long');
  const sb = document.getElementById('btn-short');
  if (lb) lb.disabled = true;
  if (sb) sb.disabled = true;

  try {
    const result = await apiDecide(state.current.round_id, decision, state.tfActive);
    const isTimeout = decision === null;
    const hit = !isTimeout && result.hit;

    let points;
    if (isTimeout || !hit) {
      points = -100;
      state.streak = 0;
    } else {
      state.streak++;
      points = Math.round(100 * streakMult(state.streak));
    }
    state.score += points;
    if (result.monkey_hit) state.monkeyScore += 100; else state.monkeyScore -= 100;

    // Outcome haptic + confetti
    if (hit) {
      // mild buzz on hit, stronger on streak hits
      if (state.streak >= 2) {
        haptic([20, 30, 30]);
        // confetti intensity 0.2 at streak 2, up to 1.0 at streak 5+
        const intensity = Math.min(1, 0.15 + (state.streak - 1) * 0.22);
        burstConfetti(intensity);
      } else {
        haptic(25);
      }
    } else {
      haptic([50, 30, 50]);  // sharper double-buzz on fail/timeout
    }

    // Future bars now come keyed by TF (each TF is its own game)
    const futureByTf = hydrateFutureByTf(result.future_bars_by_tf || {});
    const tfReveals = {};
    for (const tfName of ['1h', '4h', '1d']) {
      const tf = state.current.timeframes[tfName];
      if (!tf) continue;
      const future = futureByTf[tfName] || [];
      tfReveals[tfName] = {
        bars: tf.bars.concat(future),
        warmup_count: tf.warmup_count,
        context_count: tf.bars.length - tf.warmup_count,
        future_count: future.length,
      };
    }

    state.lastReveal = {
      tfReveals,
      tfBet: state.tfActive,  // TF the user was on when deciding = the TF of the bet
      hit,
      timeout: isTimeout,
      points,
      decision,
      truth: result.truth,
      symbol: result.symbol,
      decision_ts: result.decision_ts,
      exit_ts: result.exit_ts,
      entry_price: result.entry_price,
      exit_price: result.exit_price,
      pct_change: result.pct_change,
      ms_to_decide: msToDecide,
      streak_after: state.streak,
      score_after: state.score,
      monkey_decision: result.monkey_decision,
      monkey_hit: result.monkey_hit,
      monkey_sentiment_long_pct: result.monkey_sentiment_long_pct,
      monkey_hits_individual: result.monkey_hits_individual,
    };

    state.history.push({
      round_idx: state.round,
      symbol: result.symbol,
      start_ts: result.start_ts,
      decision_ts: result.decision_ts,
      exit_ts: result.exit_ts,
      entry_price: result.entry_price,
      exit_price: result.exit_price,
      pct_change: result.pct_change.toFixed(4),
      decision: decision || '',
      truth: result.truth,
      hit: hit,
      timeout: isTimeout,
      tf_used: state.tfActive,
      ms_to_decide: msToDecide,
      points: points,
      streak_after: state.streak,
      score_after: state.score,
      monkey_decision: result.monkey_decision,
      monkey_hit: result.monkey_hit,
    });

    renderReveal();
    prefetchNextRound();  // start loading next round in background during the 3s reveal
    setTimeout(() => nextRound(), 3000);
  } catch (err) {
    // Network/server failure on /decide: treat this round as a missed timeout
    // and continue to next round so the UX doesn't freeze. Preferable to
    // showing a dead end.
    console.warn('decide failed, treating as timeout:', err);
    state.streak = 0;
    state.score -= 100;
    state.history.push({
      round: state.round,
      symbol: state.current.symbol_anonymized || '●●●',
      hit: false,
      timeout: true,
      points: -100,
      decision: null,
      truth: null,
      _error: true,
    });
    // Skip the reveal; go straight to next round
    state._prefetchPromise = null;
    setTimeout(() => nextRound(), 500);
  }
}

// ──────────────────────────────────────────────────────────────
// Charts of the Day (COTD) — weekly state & persistence
// ──────────────────────────────────────────────────────────────
// Structure in localStorage.candleeye_cotd:
// {
//   "weekStart": "2026-04-20",         // Monday of current week, YYYY-MM-DD
//   "days": {
//     "2026-04-21": { played: true, hit: true },
//     ...
//   }
// }
// Production would fetch this from a Binance user profile instead.
function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getUTCDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setUTCDate(d.getUTCDate() + diff);
  return d.toISOString().slice(0, 10);
}
function getSundayOfWeek(date) {
  const monday = new Date(getMondayOfWeek(date) + 'T00:00:00Z');
  monday.setUTCDate(monday.getUTCDate() + 6);
  return monday.toISOString().slice(0, 10);
}
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function getCOTDState() {
  const today = todayISO();
  const weekStart = getMondayOfWeek(today);
  let st;
  try { st = JSON.parse(localStorage.getItem('candleeye_cotd') || '{}'); }
  catch (e) { st = {}; }
  // New week: reset
  if (st.weekStart !== weekStart) {
    st = { weekStart, days: {} };
    try { localStorage.setItem('candleeye_cotd', JSON.stringify(st)); } catch (e) {}
  }
  if (!st.days) st.days = {};
  return st;
}
function recordCOTDResult(hit) {
  const st = getCOTDState();
  const today = todayISO();
  st.days[today] = { played: true, hit: hit };
  try { localStorage.setItem('candleeye_cotd', JSON.stringify(st)); } catch (e) {}
  return st;
}
function countCOTDWins() {
  const st = getCOTDState();
  return Object.values(st.days).filter(d => d.hit).length;
}
function countCOTDPlayed() {
  const st = getCOTDState();
  return Object.keys(st.days).length;
}
function hasCOTDPlayedToday() {
  const st = getCOTDState();
  return !!st.days[todayISO()];
}
function msUntilNextDay() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setUTCDate(tomorrow.getUTCDate() + 1);
  tomorrow.setUTCHours(0, 0, 0, 0);
  return tomorrow.getTime() - now.getTime();
}
function formatCountdown(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return { h, m, s: sec };
}

// Monte Carlo percentile (client-side, replicates scoring)
function percentileVsMonkeys(userScore, trials) {
  trials = trials || 3000;
  const pLong = window.__LONG_BIAS__ || 0.5;
  let beat = 0;
  for (let t = 0; t < trials; t++) {
    let s = 0, streak = 0;
    for (let r = 0; r < ROUNDS_PER_GAME; r++) {
      // Monkey: long with prob pLong; hit randomly with ~50% since its direction is uncorrelated with truth
      const hit = Math.random() < 0.5;
      if (hit) { streak++; s += Math.round(100 * streakMult(streak)); }
      else { s -= 100; streak = 0; }
    }
    if (userScore > s) beat++;
  }
  return Math.round((beat / trials) * 100);
}

function buildShareText() {
  const st = getCOTDState();
  const todayData = st.days[todayISO()];
  const lastSessionHits = state.history.filter(h => h.hit).length;
  const total = state.history.length || 5;

  // Emoji line: gold for hit, gray for miss
  const emojis = state.history.map(h => h.hit ? '🟡' : '⬛').join('');
  const score = state.history.length ? `${lastSessionHits}/${total}` : '—';

  // Example output:
  //   Charts of the Day · 21/04 · 3/5
  //   🟡🟡⬛🟡⬛
  //   Esta semana: ◼◼◻◻◻◻◻
  const weekGrid = t('cotdWeekdays').map((_, i) => {
    const d = new Date(st.weekStart + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + i);
    const iso = d.toISOString().slice(0, 10);
    const dayData = st.days[iso];
    if (!dayData) return '◻';
    return dayData.hit ? '◼' : '◽';
  }).join('');

  const shortDate = todayISO().slice(5);  // MM-DD
  const line1 = `${t('cotdName')} · ${shortDate} · ${score}`;
  const line2 = emojis;
  const line3 = `${t('cotdWeekdays').join(' ')}`;
  const line4 = weekGrid;
  return `${line1}\n${line2}\n\n${line3}\n${line4}`;
}

    const el = document.getElementById('copy-confirm');
    if (!el) return;
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 1500);
  };

  const copyToClipboard = async (text) => {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        showCopied();
      } else {
        // Fallback: use a temporary textarea
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed'; ta.style.top = '-1000px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showCopied(); } catch (e) {}
        document.body.removeChild(ta);
      }
    } catch (e) { console.error(e); }
  };

  document.getElementById('copy-share-btn').addEventListener('click', () => {
    copyToClipboard(shareText);
  });

  // Native Web Share API (iOS, Android)
  document.getElementById('native-share-btn').addEventListener('click', async () => {
    if (navigator.share) {
      try {
        await navigator.share({
          title: t('cotdName'),
          text: shareText,
        });
      } catch (e) {
        // User cancelled or failed — fallback to copy
        copyToClipboard(shareText);
      }
    } else {
      // No native share API (desktop) — just copy
      copyToClipboard(shareText);
    }
  });
}
